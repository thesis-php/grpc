name: Split Packages

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
    tags:
      - '*.*.*'

concurrency:
  group: split-packages-${{ github.ref_type }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  split:
    runs-on: ubuntu-latest
    if: >-
      (github.ref_type == 'tag' && contains(github.ref_name, '.'))
      || (github.ref_type == 'branch' && startsWith(github.ref_name, '0.') && endsWith(github.ref_name, '.x'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: packages/grpc
            remote: thesis-php/grpc-protocol
            packagist: thesis/grpc-protocol
          - prefix: packages/client
            remote: thesis-php/grpc-client
            packagist: thesis/grpc-client
          - prefix: packages/server
            remote: thesis-php/grpc-server
            packagist: thesis/grpc-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader || true

      - name: Split
        id: split
        run: echo "sha=$(git subtree split --prefix=${{ matrix.prefix }} ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Push branch
        if: github.ref_type == 'branch'
        run: >-
          git push
          "https://x-access-token:${{ secrets.SPLIT_REPOS_TOKEN }}@github.com/${{ matrix.remote }}.git"
          "${{ steps.split.outputs.sha }}:refs/heads/${{ github.ref_name }}"
          --force

      - name: Push tag
        if: github.ref_type == 'tag'
        run: >-
          git push
          "https://x-access-token:${{ secrets.SPLIT_REPOS_TOKEN }}@github.com/${{ matrix.remote }}.git"
          "${{ steps.split.outputs.sha }}:refs/tags/${{ github.ref_name }}"

      - name: Create release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.SPLIT_REPOS_TOKEN }}
        run: >-
          gh release view "${{ github.ref_name }}" --repo "${{ matrix.remote }}" >/dev/null 2>&1
          || gh release create "${{ github.ref_name }}"
          --repo "${{ matrix.remote }}"
          --title "${{ github.ref_name }}"
          --generate-notes
          --verify-tag

      - name: Notify Packagist
        if: github.ref_type == 'tag'
        run: >-
          curl -fsSL -X POST
          "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}"
          -H "Content-Type: application/json"
          -d '{"repository":{"url":"https://github.com/${{ matrix.remote }}"}}'
